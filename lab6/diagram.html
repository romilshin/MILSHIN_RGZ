<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мильшин Роман Антонович. Диаграмма</title>
    <link rel="shortcut icon" href="../favicon.ico" type="image/x-icon">
    <link rel="icon" href="../favicon-16x16.png">
    <link rel="icon" href="../favicon-32x32.png">
    <link rel="stylesheet" href="../main.css">

    <style>
        #diag {
            border: 1px solid black;
            width: fit-content;
            background-color: white;
            height: fit-content;
            display: flex;
            align-items: flex-end;
            text-align: center;
            color: rgb(225, 249, 191);
        }

        .bar {
            width: 100px;
            border: 1px solid aqua;
            display: inline-block;
        }
    </style>

    <script>
        function showDiagram() {
            let data = [71, 34, 73, 52, 87, 13, 53, 91, 27, 44];
            let colors = ['red', 'orange', 'blue', 'darkcyan', 'purple', 'green', 'brown', 'black', 'gray', 'darkred']
            let bars = document.getElementsByClassName('bar');
            const diagHeight = document.getElementById('diag').clientWidth;
            const maxData = Math.max(...data);
            const k = diagHeight / maxData * 0.9;
            
            for(let i = 0; i < data.length; i++) {
                bars[i].style.height = k*data[i] + 'px';
                bars[i].style.backgroundColor = colors[i];
                bars[i].innerHTML = Math.round(k*data[i]);
            }
        }

    </script>
</head>
<body onload="showDiagram()">
    <header>
        НГТУ, ФБ, Лабораторная работа 6
    </header>


    <main>
        <div id="diag">
            <div class="bar" id="output"></div>
            <div class="bar" id="output"></div>
            <div class="bar" id="output"></div>
            <div class="bar" id="output"></div>
            <div class="bar" id="output"></div>
            <div class="bar" id="output"></div>
            <div class="bar" id="output"></div>
            <div class="bar" id="output"></div>
            <div class="bar" id="output"></div>
            <div class="bar" id="output"></div>
        </div>
    </main>

    <footer>
        &copy; Мильшин Роман, ФБИ-42, 2 курс, 2026
    </footer>
    
</body>
</html>
