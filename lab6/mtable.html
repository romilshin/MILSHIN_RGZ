<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мильшин Роман Антонович. Таблица умножения</title>
    <link rel="shortcut icon" href="../favicon.ico" type="image/x-icon">
    <link rel="icon" href="../favicon-16x16.png">
    <link rel="icon" href="../favicon-32x32.png">
    <link rel="stylesheet" href="../main.css">

    <script>
        function showMutipleTable() {
            let inputA = document.getElementById("numberA");
            let inputB = document.getElementById("numberB");
            let inputC = document.getElementById("numberC");

            let a = parseInt(inputA.value);
            let b = parseInt(inputB.value);
            let c = parseInt(inputC.value);

            

            if(isNaN(a) || isNaN(b) || isNaN(c)) {
                alert('Введены не все значения!')
                return;
            }

            if(b > c) {
                alert('Значение, с которого начинается таблица не может быть больше того, на котором таблица заканчивается!');
                inputB.focus();
                inputB.select();
                inputB.style.color = "red";
                inputB.style.borderColor = "red";
                inputC.style.color = "red";
                inputC.style.borderColor = "red";
                return;
            }
            inputA.style.color = "";
            inputA.style.borderColor = "";
            inputB.style.color = "";
            inputB.style.borderColor = "";

            let tbl = document.getElementById('mtable');
            tbl.innerHTML = '<h1>Таблица умножения</h1>';
            for(b; b <= c; b++) {
                let s = `<div class="mult">${b} * ${a} = ${b*a}</div>`;
                tbl.innerHTML += s;
            }
        }
    </script>

    <style>
        .mult {
            border: 1px solid black;
            border-radius: 20%;
            padding: 2px;
            background-color: white;
            font-size: 24px;
            width: fit-content;
        }
        
        #mtable {
            /* margin: 2px; */
            display: inline-block;
        }
        
        #mtable h1 {
            border: none;
        }

        .button1 {
            border: 1px solid black;
            border-radius: 10%;
            background-color: gray;
            font-size: 24px;
            width: 100px;
            cursor: pointer;
        }
    </style>
</head>
<body> 
    <header>
        НГТУ, ФБ, Лабораторная работа 6
    </header>

    <main>
        <div id="mtable"></div>
        <hr>
        <label>Умножить на: <input type="number" value="" id="numberA"></label><br>
        <label>Начать с: <input type="number" value="" id="numberB"></label><br>
        <label>Закончить на: <input type="number" value="" id="numberC"></label><br>
        <div class="button1" onclick="showMutipleTable()">Таблица</div>


    </main>

    <footer>
        &copy; Мильшин Роман, ФБИ-42, 2 курс, 2026
    </footer>
    
</body>
</html>
