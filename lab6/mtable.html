<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мильшин Роман Антонович. Таблица умножения</title>
    <link rel="shortcut icon" href="../favicon.ico" type="image/x-icon">
    <link rel="icon" href="../favicon-16x16.png">
    <link rel="icon" href="../favicon-32x32.png">
    <link rel="stylesheet" href="../main.css">

    <script>
        function showMutipleTable() {
            let tbl = document.getElementById('mtable');
            tbl.innerHTML = '<h1>Таблица умножения</h1>';
            for(i = 1; i <= 10; i++) {
                let s = `<div class="mult">${i} * 7 = ${i*7}</div>`;
                tbl.innerHTML += s;
            }
        }
    </script>

    <style>
        .mult {
            border: 1px solid black;
            border-radius: 20%;
            width: 100px;
            padding: 2px;
            background-color: white;
            font-size: 20px;
        }
        
        #mtable {
            width: auto;
            display: inline-block;
        }
        
        #mtable h1 {
            border: none;
        }
    </style>
</head>
<body onload="showMutipleTable()"> 
    <header>
        НГТУ, ФБ, Лабораторная работа 6
    </header>

    <main>
        <div id="mtable"></div>
    </main>

    <footer>
        &copy; Мильшин Роман, ФБИ-42, 2 курс, 2026
    </footer>
    
</body>
</html>
