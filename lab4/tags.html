<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Облако тегов</title>
    <link rel="shortcut icon" href="../favicon.ico" type="image/x-icon">
    <link rel="icon" href="../favicon-16x16.png">
    <link rel="icon" href="../favicon-32x32.png">
    <link rel="stylesheet" href="../lab2/main.css">
    <style>
        section {
            position: relative;
            width: 100%;
            min-height: 500px;
        }

        .tag {
            position: absolute;
            transition: 1s;
        }

        .tag:hover {
            transform: scale(1.5) rotate(0deg) !important;
            z-index: 1;
            transition: 1s;
        }
    </style>
</head>
<body>
    <header>
        НГТУ, ФБ, Лабораторная работа 4
    </header>

    <main>
        <section>
            <div class="tag" style="top: 5%; left: 8%; font-size: 100px; color: #c0392b; transform: rotate(-15deg)">static</div>
            <div class="tag" style="top: 12%; left: 48%; font-size: 50px; color: #2980b9; transform: rotate(7deg)">relative</div>
            <div class="tag" style="top: 22%; left: 25%; font-size: 30px; color: #27ae60; transform: rotate(-6deg)">absolute</div>
            <div class="tag" style="top: 35%; left: 70%; font-size: 45px; color: #8e44ad; transform: rotate(12deg) ">fixed</div>
            <div class="tag" style="top: 48%; left: 12%; font-size: 40px; color: #e67e22; transform: rotate(-9deg)">sticky</div>
            <div class="tag" style="top: 60%; left: 45%; font-size: 70px; color: #16a085; transform: rotate(4deg) ">z-index</div>
            <div class="tag" style="top: 75%; left: 78%; font-size: 30px; color: #d35400; transform: rotate(-20deg)">left</div>
            <div class="tag" style="top: 8%; left: 82%; font-size: 50px; color: #1e6f5c; transform: rotate(10deg) ">width</div>
            <div class="tag" style="top: 18%; left: 68%; font-size: 60px; color: #c0392b; transform: rotate(-18deg) ">margin</div>
            <div class="tag" style="top: 42%; left: 5%; font-size: 50px; color: #2c3e50; transform: rotate(6deg)">transform</div>
            <div class="tag" style="top: 55%; left: 75%; font-size: 75px; color: #8e44ad; transform: rotate(-5deg)">display</div>
            <div class="tag" style="top: 70%; left: 30%; font-size: 80px; color: #e67e22; transform: rotate(14deg)">bottom</div>
            <div class="tag" style="top: 82%; left: 55%; font-size: 120px; color: #27ae60; transform: rotate(-8deg)">clear</div>
            <div class="tag" style="top: 28%; left: 45%; font-size: 100px; color: #7d3c98; transform: rotate(-3deg)">float</div>
            <div class="tag" style="top: 65%; left: 88%; font-size: 70px; color: #d35400; transform: rotate(18deg)">height</div>
            <div class="tag" style="top: 40%; left: 58%; font-size: 35px; color: #1abc9c; transform: rotate(-12deg)">padding</div>
            <div class="tag" style="top: 15%; left: 35%; font-size: 45px; color: #c44536; transform: rotate(3deg)">right</div>
            <div class="tag" style="top: 88%; left: 15%; font-size: 90px; color: #2c6e9e; transform: rotate(-7deg)">top</div>
        </section>
    </main>

    <footer>
        &copy; Мильшин Роман, ФБИ-42, 2 курс, 2026
    </footer>
</body>
</html>
