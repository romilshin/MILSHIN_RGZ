<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мильшин Роман Антонович. Событие</title>
    <link rel="shortcut icon" href="../favicon.ico" type="image/x-icon">
    <link rel="icon" href="../favicon-16x16.png">
    <link rel="icon" href="../favicon-32x32.png">
    <link rel="stylesheet" href="../lab2/main.css">

    <style>
        #block {
            width: 350px;
            height: 350px;
            border: 1px solid black;
            background-color: white;
            cursor: crosshair;
        }
    </style>

    <script>
        function showCoords() {
            let x = this.event.x;
            let y = this.event.y;
            let div = document.getElementById('block');
            div.innerHTML = '<b>x</b> = ' + x + 'px<br><b>y</b> = ' + y + 'px';
            div.style.backgroundColor = 'white';

            if(this.event.ctrlKey) {
                div.style.color = 'red';
                div.innerHTML = '<b>x</b> = ' + x + 'px<br><b>y</b> = ' + y + 'px' + '<br>Нажата клавиша Ctrl';
            }
            else if(this.event.altKey) {
                div.style.color = 'yellow';
                div.style.backgroundColor = 'red';
                div.innerHTML = '<b>x</b> = ' + x + 'px<br><b>y</b> = ' + y + 'px' + '<br>Нажата клавиша Alt';
            }
            else if(this.event.shiftKey) {
                div.style.color = 'blue';
                div.style.backgroundColor = 'pink';
                div.innerHTML = '<b>x</b> = ' + x + 'px<br><b>y</b> = ' + y + 'px' + '<br>Нажата клавиша Shift';
            }
            else
                div.style.color = 'black'
        }
    </script>
</head>
<body>
    <header>
        НГТУ, ФБ, Лабораторная работа 5
    </header>

    <main>
        <div id="block" onmousemove="showCoords()"></div>
    </main>

    <footer>
        &copy; Мильшин Роман, ФБИ-42, 2 курс, 2026
    </footer>
    
</body>
</html>
