<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мильшин Роман Антонович. Вывод суммы</title>
    <link rel="shortcut icon" href="../favicon.ico" type="image/x-icon">
    <link rel="icon" href="../favicon-16x16.png">
    <link rel="icon" href="../favicon-32x32.png">
    <link rel="stylesheet" href="../lab2/main.css">
    <script>
        function showSum() {
            let inputA = document.getElementById("numberA");
            let inputB = document.getElementById("numberB");
            let a = parseInt(inputA.value);
            let b = parseInt(inputB.value);

            if(isNaN(a)) {
                alert("Введите числовое значение в первое поле");
                return;
            }
            if(isNaN(b)) {
                alert("Введите числовое значение во второе поле");
                return;
            }
            
            let result = a + b;
            alert(a + " + " + b + " = " + result);
        }

        function showDif() {
            let inputA = document.getElementById("numberA");
            let inputB = document.getElementById("numberB");
            let a = parseInt(inputA.value);
            let b = parseInt(inputB.value);
            if(isNaN(a)) {
                alert("Введите числовое значение в первое поле");
                return;
            }
            if(isNaN(b)) {
                alert("Введите числовое значение во второе поле");
                return;
            }
            let result = a - b;
            alert(a + " - " + b + " = " + result);
        }

        function showMult() {
            let inputA = document.getElementById("numberA");
            let inputB = document.getElementById("numberB");
            let a = parseInt(inputA.value);
            let b = parseInt(inputB.value);
            if(isNaN(a)) {
                alert("Введите числовое значение в первое поле");
                return;
            }
            if(isNaN(b)) {
                alert("Введите числовое значение во второе поле");
                return;
            }
            let result = a * b;
            alert(+ a + " * " + b + " = " + result);
        }

        function showDiv() {
            let inputA = document.getElementById("numberA");
            let inputB = document.getElementById("numberB");

            let a = parseInt(inputA.value);
            let b = parseInt(inputB.value);

            if(b == 0) {
                alert("На 0 делить нельзя!")
                inputB.focus();
                inputB.select();
                inputB.style.color = "red";
                inputB.style.borderColor = "red";
                return;
            }

            if(isNaN(a)) {
                alert("Введите числовое значение в первое поле");
                return;
            }
            if(isNaN(b)) {
                alert("Введите числовое значение во второе поле");
                return;
            }

            inputB.style.color = "";
            inputB.style.borderColor = "";

            let result = a / b;
            alert(a + " / " + b + " = " + result);
        }

        function showExp() {
            let inputA = document.getElementById("numberA");
            let inputB = document.getElementById("numberB");

            let a = parseInt(inputA.value);
            let b = parseInt(inputB.value);

            if(a == 0 && b == 0) {
                alert("Оба числа не должны быть равны 0 одновременно!")
                inputA.focus();
                inputA.select();
                inputA.style.color = "red";
                inputA.style.borderColor = "red";
                inputB.style.color = "red";
                inputB.style.borderColor = "red";
                return;
            }

            inputA.style.color = "";
            inputA.style.borderColor = "";
            inputB.style.color = "";
            inputB.style.borderColor = "";

            if(isNaN(a)) {
                alert("Введите числовое значение в первое поле");
                return;
            }
            if(isNaN(b)) {
                alert("Введите числовое значение во второе поле");
                return;
            }


            let result = a ** b;
            alert(a + " ** " + b + " = " + result);
        }

        function showAuthor() {
            let author = "Автор страницы: \nМильшин Роман Антонович"
            alert(author);
        }

        function showMessage() {
            let message1 = "всем привет, меня зовут рома"
            let message2 = "пупупупу"
            alert(message1 + "\n" + message2)
        }

        function changeOutput(buttonNum, backColor, textColor, borderStyle, borderRadius, borderWidth, borderThickness) {
            let output = document.getElementById("output");
            output.innerHTML = "Нажата кнопка " + buttonNum;
            output.style.backgroundColor = backColor;
            output.style.color = textColor;
            output.style.borderStyle = borderStyle;
            output.style.borderRadius = borderRadius;
            output.style.borderWidth = borderWidth;
            output.style.borderColor = borderThickness;
        }
    </script>
    <style>
        .message {
            cursor: pointer;
            border: 7px solid green;
            border-radius: 5px;
            width: 300px;
            margin: 0 auto;
            background-color:mediumaquamarine;
            display: inline-block;
            height: 100px;
            text-align: center;
            line-height: 80px;
        }

        footer {
            cursor: pointer;
        }

        #output {
            border: 1px solid;
            width: 300px;
            height: 40px;
        }
    </style>
</head>
<body>
    <header onclick="showAuthor()"> 
        НГТУ, ФБ, Лабораторная работа 5
    </header>

    <main>
        <label>Первое число: <input type="number" value="" id="numberA"></label><br>
        <label>Второе число: <input type="number" value="" id="numberB"></label><br>
        <div class="message" onclick="showSum()">Найти сумму чисел</div>

        <div class="message" onclick="showDif()">Найти разность чисел</div>
        
        <div class="message" onclick="showMult()">Найти произведение чисел</div>

        <div class="message" onclick="showDiv()">Найти отношение чисел</div>
        
        <div class="message" onclick="showExp()">Возведение числа в степень</div>

        <div class="message" onclick="showAuthor()">Узнать, кто автор страницы</div>
    
        <div>
            <input type="button" value="Кнопка 1" onclick="changeOutput(1, 'red', 'yellow', 'dotted', '15px', '3px', 'gold')">
            <input type="button" value="Кнопка 2" onclick="changeOutput(2, 'black', 'lime', 'dashed', '20px', '4px', 'cyan')">
            <input type="button" value="Кнопка 3" onclick="changeOutput(3, 'white', 'black', 'solid', '8px', '2px', 'magenta')">
            <input type="button" value="Кнопка 4" onclick="changeOutput(4, 'blue', 'pink', 'double', '25px', '5px', 'orange')">
        </div>

        <div id="output"></div>
    </main>

    <footer ondblclick="showMessage()">
        &copy; Мильшин Роман, ФБИ-42, 2 курс, 2026
    </footer>
    
</body>
</html>
