<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мильшин Роман Антонович. Вывод суммы</title>
    <link rel="shortcut icon" href="../favicon.ico" type="image/x-icon">
    <link rel="icon" href="../favicon-16x16.png">
    <link rel="icon" href="../favicon-32x32.png">
    <link rel="stylesheet" href="../lab2/main.css">
    <script>
        function showSum() {
            let inputA = document.getElementById("numberA");
            let inputB = document.getElementById("numberB");

            let a = parseInt(inputA.value);
            let b = parseInt(inputB.value);
            let result = a + b;
            alert("Сумма " + a + " и " + b + " равна " + result);
        }

        function showAuthor() {
            let author = "Автор страницы: \nМильшин Роман Антонович"
            alert(author);
        }

        function showMessage() {
            let message1 = "всем привет, меня зовут рома"
            let message2 = "пупупупу"
            alert(message1 + "\n" + message2)
        }
    </script>
    <style>
        .message {
            cursor: pointer;
            border: 7px solid green;
            border-radius: 5px;
            width: 300px;
            margin: 0 auto;
            background-color:mediumaquamarine;
            display: inline-block;
            height: 100px;
            text-align: center;
            line-height: 80px;
        }

        footer {
            cursor: pointer;
        }
    </style>
</head>
<body>
    <header onclick="showAuthor()"> 
        НГТУ, ФБ, Лабораторная работа 5
    </header>

    <main>
        <label>Первое число: <input type="number" value="5154" id="numberA"></label><br>
        <label>Второе число: <input type="number" value="7891" id="numberB"></label><br>
        <div class="message" onclick="showSum()">Найти сумму чисел</div>
        
        <div class="message" onclick="showAuthor()">Узнать, кто автор страницы</div>
    </main>

    <footer ondblclick="showMessage()">
        &copy; Мильшин Роман, ФБИ-42, 2 курс, 2026
    </footer>
    
</body>
</html>
